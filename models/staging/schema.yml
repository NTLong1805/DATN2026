version: 2
sources:
  - name: DATN_RAW
    project: datn2025-490902
    dataset: DATN_RAW
    tables:
      - name: Address
        description: Thông tin địa chỉ khách hàng
        columns:
          - name: _id
            description: Khóa chính định danh duy nhất của bảng
          - name: postal_code
            description: Mã bưu chính
          - name: main_address
            description: Địa chỉ chính của KH
            type: text
          - name: second_address
            description: Địa chỉ thứ 2 của KH
            type: text
          - name: _ts
            description: Ngày sửa thông tin
            type: timestamp
          - name: city
            description: City of address
            type: text
      - name: BusinessEntity
        description: Source of the ID that connects vendors, customers, and employees with address and contact information.
        columns:
          - name: entity_id
            description: Khóa chính định danh duy nhất của bảng. Khóa chính cho khách hàng, nhà cung cấp, và nhana viên.
            type: text
            tests:
              - not_null
              - unique
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: BusinessEntityAddress
        description: Bảng đối chiếu giúp liên kết thông tin khách hàng, nhà cung cấp và nhân viên với địa chỉ của họ.
        columns:
          - name: _id
            description: Khóa chính. Khóa ngoại của bảng BusinessEntity
            type: text
            tests:
              - not_null
              - unique
          - name: address_type_id
            description: Khóa chính. Khóa ngoại tới bảng AddressType
            type: text
            tests:
              - not_null
              - unique
          - name: address_id
            description: Khóa chính. Khóa ngoại tới bảng Address
            type: text
            tests:
              - not_null
              - unique
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: BusinessEntityContact
        description: Bảng đối chiếu chéo thể hiện mối liên hệ giữa cửa hàng, nhà cung cấp và nhân viên với con người.
        columns:
          - name: _id
            description: Khóa chính. Khóa ngoại của bảng BusinessEntity
            type: text
            tests:
              - not_null
              - unique
          - name: contact_type_id
            description: Khóa chính. Khóa ngoại tới bảng ContactType
            type: text
            tests:
              - not_null
              - unique
          - name: person_id
            description: Khóa chính. Khóa ngoại tới bảng person
            type: text
            tests:
              - not_null
              - unique
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: ContactType
        description: Bảng tra cứu chứa các loại liên hệ của thực thể kinh doanh.
        columns:
          - name: _id
            description: Khóa chính định danh duy nhất của bảng
            type: text
            tests:
              - not_null
              - unique
          - name: contact_description
            description: Miêu tả cho ContactType
            type: text
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: CountryRegion
        description: Bảng tra cứu cho mã code ISO cho quốc gia và vùng lãnh thổ
        columns:
          - name: _id
            description: Khóa định danh duy nhất của bảng.Mã ISO cho quốc gia và vùng lãnh thổ
            type: text
            tests:
              - not_null
              - unique
          - name: country
            description: Tên quốc gia
            type: text
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: CountryRegionCurrency_csv
        description: Bảng tham chiếu mã ISO của tiền tệ của mỗi quốc gia
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. Mã ISO của tiền tệ
            type: text
            tests:
              - not_null
              - unique
          - name: country_code
            description: Mã ISO cho quốc gia và vùng lãnh thổ. Khóa ngoại liên kết với country_region
            type: text
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: CreditCard
        description: Thông tin thẻ tín dụng của khách hàng
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng.
            type: text
            tests:
              - not_null
              - unique
          - name: card_num
            description: Số thẻ tín dụng
            type: text
          - name: card_type
            description: Tên thẻ tín dụng
            type: text
          - name: exp_month
            description: Tháng hết hạn của thẻ tín dụng
          - name: exp_year
            description: Năm hết hạn của thẻ tín dụng
      - name: Culture
        description: Bảng tra cứu những ngôn ngữ được lưu trữ ở database
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng
            type: text
            tests:
              - not_null
              - unique
          - name: culture_name
            description: Tên ngôn ngữ
            type: text
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: Currency_csv
        description: Bảng tra cứu thông tin tiền tệ
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. Mã ISO của tiền tệ
            type: text
            tests:
              - not_null
              - unique
          - name: currency_name
            description:  Tên của tiền tệ
            type: text
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: CurrencyRate
        description: Bảng tra cứu tỉ lệ đổi tiền giữa các loại tiền tệ
      - name: Customer
        description: Thông tin của khách hàng. Liên kết với bảng Person và Shop.
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. ID của Customer
            type: text
            tests:
              - not_null
              - unique
          - name: person_id
            description: Mã định danh của person. Là khóa ngoại liên kết tới bảng Person
            type: text
          - name: store_id
            description: Mã định danh của store. Là khóa ngoại liên kết tới bảng store
            type: text
          - name: territory_id
            description: Mã định danh của lãnh thổ. Là khóa ngoại liên kết tới bảng Territory
            type: text
          - name: account_number
            description: được viết theo định dạng isnull('AW'+[ufnLeadingZeros]([CustomerID]),''). Mã số duy nhất dùng để nhận dạng khách hàng, được hệ thống kế toán gán cho.
            type: text
          - name: _ts
            description:  Ngày chỉnh sửa
            type: timestamp
      - name: department
        description: Là bảng tra cứu thông tin phòng ban trong công ty AdventureWork
        columns:
          - name: _id
            description: Là mã định danh duy nhất của bảng. Mã phòng ban
            type: text
            tests:
              - unique
              - not_null
          - name: department_name
            description: Tên phòng ban
            type: text
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: EmailAddress
        description: Bảng tra cứu địa chỉ Email
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. Mã ID của Email
            type: text
            tests:
              - not_null
              - unique
          - name: person_id
            description:  Mã định danh của Person. Khóa ngoại tới bảng person
            type: text
          - name: email_address
            description: Địa chỉ Email
            type: text
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: Employee
        description: Thông tin của nhân viên như lương, phòng ban, và chức vụ.
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. ID của nhân viên
            type: text
            tests:
              - not_null
              - unique
          - name: national_id
            description: Mã CCCD của nhân viên
            type: text
          - name: login_id
            type: text
          - name: organization_level
            description: Vị trí của nhân viên trong hệ thống phân cấp doanh nghiệp
            type: int
          - name: job_title
            description: Chức vụ nhân viên
            type: text
          - name: birth_date
            description: ngày sinh của nhân viên
            type: timestamp
          - name: martial_status
            description: Tình trạng hôn nhân
            type: text
          - name: sex
            description: Giới tính
            type: text
          - name: hire_date
            description: Ngày được tuyển dụng
            type: timestamp
          - name: is_offical
            description: Đã là nhân viên chính thức chưa. 0 = chưa, 1 = rồi
            type: int
          - name: holiday_hour
            description: Số giờ được nghỉ phép
            type: int
          - name: absent
            description: Số số vắng mặt do ốm
            type: int
          - name: status
            description: Tình trạng nhân viên. 1 = active, 0 = inactive
            type: int
          - name: _ts
            description: Ngày chỉnh sửa
            type: timestamp
      - name: EmployeeDepartmentHistory
        description: Lịch sử chuyển phòng ban của nhân viên
        columns:
          - name: _id
            description: Mã định danh của nhân viên(Employee_id)
            type: text
          - name: department_id
            description: Mã định danh phòng ban
            type: text
          - name: shift_id
            description: Mã định danh ca làm việc
            type: text
          - name: start_date
            description: Ngày bắt đầu làm việc
            type: timestamp
          - name: end_date
            description: Ngày kết thúc làm việc
            type: timestamp
          - name: _ts
            description: Ngày chỉnh sửa bản ghi
            type: timestamp
      - name: EmployeePayHistory
        description: Lịch sử lương của nhân viên
        columns:
          - name: _id
            description: Mã định danh duy nhất của nhân viên(Employee_id)
            type: text
          - name: salary
            description: Lương theo giờ
            type: Numeric
          - name: pay_frequency
            description: Thời gian trả lương. 1 = Trả lương theo tháng. 2 = Trả lương theo tuần
            type: int64
          - name: rate_change_date
            description: Ngày có hiệu lực sự thay đổi về lương
            type: timestamp
          - name: _ts
            description: Ngày chỉnh sửa bản ghi
            type: timestamp
      - name: person
        description: Bảng thông tin Person bao gồm Employee,Customer và Vendor
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. Khóa chính
            type: text
            tests:
              - not_null
              - unique
          - name: title
            description: Danh hiệu lịch sự Mr,Ms,Mrs,...
            type: text
          - name: suffix
            description: Hậu tố họ
            type: text
          - name: last_name
            description: Họ
            type: text
          - name: middle_name
            description: Tên đệm
            type: text
          - name: first_name
            description: Tên
            type: text
          - name: name_style
            description: 0 = The data in FirstName and LastName are stored in western style (first name, last name) order. 1 = Eastern style (last name, first name) order.
            type: bytes
          - name: person_type
            description: Primary type of person SC = Store Contact, IN = Individual (retail) customer, SP = Sales person, EM = Employee (non-sales), VC = Vendor contact, GC = General contact
            type: text
          - name: purchase_amount_ytd
            description: Chi tiêu của khách hàng từ năm ngoái
            type: numeric
          - name: date_first_purchase
            description: Ngày đầu tiên mua hàng của khách hàng
            type: timestamp
          - name: birth_date
            description: Ngày sinh
            type: timestamp
          - name: martial_status
            description: Tình trạng hô nhân
            type: text
          - name: yearly_income
            description: Thu nhập hằng năm
            type: numeric
          - name: sex
            description: Giới tính
            type: text
          - name: total_children
            description: Số lượng con
            type: numeric
          - name: total_children_at_home
            description: Số lượng con chưa đi học
            type: numeric
          - name: education
            description: Trình độ học vấn
            type: text
          - name: occupation
            description: Nghề nghiệp
            type: text
          - name: is_homeowner
            description: Đã sở hữu nhà chưa
            type: bytes
          - name: car_owned
            description: Số lượng xe sở hữu
            type: numeric
          - name: commute_distance
            description: Khoảng cách đến với cửa hàng gần nhất
            type: text
          - name: email_promotion
            description: 	0 = Contact does not wish to receive e-mail promotions, 1 = Contact does wish to receive e-mail promotions from AdventureWorks, 2 = Contact does wish to receive e-mail promotions from AdventureWorks and selected partners.
            type: numeric
          - name: additional_contact_info
            description: Thông tin thêm của khách hàng được lưu dưới dạng yml
      - name: PersonCreditCard
        description: Bảng tham chiếu tới thông tin thẻ tín dụng của từng person
        columns:
          - name: _id
            description: Mã định danh của person. Khóa ngoại liên kết tới bảng person. Khóa chính của bảng
            type: text
            tests:
              - not_null
              - unique
          - name: credit_card_id
            description: Mã định danh của thẻ tín dụng. Khóa ngoại liên kết tới bảng credit_card. Ghép với _id làm cặp khóa chính của bảng
            type: text
            tests:
              - not_null
              - unique
          - name: _ts
            description: Ngày chỉnh sửa record.
            type: timestamp
      - name: PersonPhone
        description: Số điện thoại và kiểu số điện thoại
        columns:
          - name: _id
            description: Mã định danh duy nhất của person. Khóa ngoại liên kết tới bảng person.
            type: text
            tests:
              - not_null
              - unique
          - name: credit_card_id
            description: Mã định danh duy nhất của credit_card. Khóa ngoại liên kết tới bảng credit_card
            type: text
            tests:
              - not_null
              - unique
          - name: _ts
            description: Ngày chỉnh sửa records
            type: timestamp
      - name: PhoneNumberType
        description: Kiểu số điện thoại của từng người. Cell = Điện thoại bàn, Home = Điện thoại nhà, Work= Điện thoại cơ quan
        columns:
          - name: _id
            descriptions: Mã định danh duy nhất của bảng.
            type: text
            tests:
              - not_null
              - unique
          - name: phone_number_type
            descriptions: Kiểu số điện thoại
            type: text
          - name: _ts
            descriptions: Ngày chỉnh sửa records
            type: timestamp
      - name: ProductCategory
        description: Phân loại sản phẩm
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. ID của danh mục sản phẩm
            type: text
            tests:
              - not_null
              - unique
          - name: category_name
            description: Tên danh mục sản phẩm
            type: text
          - name: _ts
            description: Ngày chỉnh sửa thông tin
            type: timestamp
      - name: ProductCostHistory
        description: Sự thay đổi của chi phí sản phẩm
        columns:
          - name: product_id
            description: Mã định danh của sản phẩm. Là khóa ngoại liên kết tới bảng Product
            type: text
            tests:
              - not_null
              - unique
          - name: standard_cost
            description: Giá tiêu chuẩn của sản phẩm
            type: numeric
          - name: start_date
            description: Ngày bắt đầu bán sản phẩm với giá đó
            type: timestamp
          - name: end_date
            description: Ngày kết thúc bán sản phẩm với giá đó
            type: timestamp
          - name: _ts
            description: Ngày chỉnh sửa records
            type: timestamp
      - name: ProductDescription
        description: Mô tả sản phẩm
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. Mã mô tả sản phẩm
            type: text
            tests:
              - not_null
              - unique
          - name: description
            description: Mô tả sản phẩm
            type: text
          - name: _ts
            description: Ngày chỉnh sửa record
            type: timestamp
      - name: ProductInventory
        description: Thông tin hàng tồn kho
      - name: ProductListPriceHistory
        description: Sự thay đổi của giá bán theo thời gian
        columns:
          - name: product_id
            description: Mã định danh của sản phẩm. Khóa ngoại liên kết tới bảng Product
            type: text
          - name: list_price
            description: Giá bán
            type: numeric
          - name: start_date
            description: Ngày bắt đầu với giá bán đó
            type: timestamp
          - name: end_date
            description: Ngày kết thúc với giá bán đó
            type: timestamp
          - name: _ts
            description: Ngày chỉnh sửa records
            type: timestamp
      - name: ProductSubCategory
        description: Danh mục phụ sản phẩm
        columns:
          - name: product_category_id
            description: Danh mục sản phẩm. Khóa ngoại liên kết tới bảng product_category
            type: text
          - name: _id
            description: Mã định danh duy nhất của bảng. ID của danh mục phụ sản phẩm
            type: text
          - name: subcategory_name
            description: Tên danh mục phụ sản phẩm
            type: text
          - name: _ts
            description: Ngày chỉnh sửa records
            type: timestamp
      - name: ProductVendor
        description: Bảng đối chiếu các nhà cung cấp và các sản phẩm mà họ cung cấp
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. ID của nhà cung cấp
            type: text
            tests:
              - not_null
              - unique
          - name: product_id
            description: Mã định danh của sản phẩm. Khóa ngoại liên kết tới bảng Product
            type: text
          - name: standard_price
            description: Giá bán thông thường của người bán
            type: numeric
          - name: average_leadtime
            description: Khoảng thời gian trung bình từ lúc order đến lúc nhận được sản phẩm
            type: numeirc
          - name: last_receipt_cost
            description: Giá bán khi mua lần cuối
            type: numeric
          - name: max_order_quantity
            description: Số lượng sản phẩm tối đa có thể order
            type: numeric
          - name: min_order_quantity
            description: Số lượng sản phẩm tối thiểu có thể order
            type: numeric
          - name: on_order_quantity
            description: Số lượng sản phẩm đang được order
            type: numeric
          - name: _ts
            description: Ngày chỉnh sửa records
            type: timestamp
      - name: PurchaseOrderDetail
        description: Chi tiết đơn hàng mua từ các nhà cung cấp
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng.
            type: text
            tests:
              - not_null
              - unique
          - name: order_id
            description: Mã định danh của PurchaseOrder. Khóa ngoại liên kết với PurchaseOrderHeader
            type: text
          - name: due_date
            description: Ngày kì vọng nhận được hàng
            type: timestamp
          - name: product_id
            description: Mã định danh của Product. Khóa ngoại liên kết với Product
            type: text
          - name: order_quantity
            description: Số lượng product đang được order
            type: numeric
          - name: unit_price
            description: Giá bán của sản phẩm do nhà cung cấp đưa ra
            type: numeric
          - name: stocked_quantity
            description: Số lượng sản phẩm được chấp nhận vào kho. Được tính bằng received - rejected
            type: numeric
          - name: received_quantity
            description: Số lượng sản phẩm thực tế nhận được
            type: numeric
          - name: rejected_quantity
            description: Số lượng sản phẩm bị từ chối sau khi kiểm tra
            type: numeric
          - name: line_total
            description: Tổng giá tiền cho mỗi sản phẩm. order_quantity * unitprice
            type: numeric
          - name: _ts
            description: Ngày chỉnh sửa record
            type: timestamp
      - name: PurchaseOrderHeader
        description: Thông tin chung của đơn nhập hàng từ nhà cung cấp
        columns:
          - name: _id
            description: Mã định danh duy nhất của bảng. order_id của mỗi đơn hàng nhập từ nhà cung cấp
            type: text
            tests:
              - unique
              - not_null
          - name: revision_number
            description: Số thứ tự để theo dõi tiến trình đơn hàng
            type: int
          - name: status
            description: Tình trạng tiến trình đơn hàng 1 = Pending 2 = Approved 3 = Rejected 4 = Complete
            type: int
          - name: employee_id
            description: Mã định danh Employee. mã nhân viên xem nhân viên nào là người đặt hàng
            type: text
          - name: vendor_id
            description: Mã định danh Vendor. Khóa ngoại liên kết tới bảng Vendor
            type: text
