        description: Kieu Dia Chi
        columns:
          - name: _id
            description: Khoa chinh cua bang
            type: text
          - name: Name
            description: Ten cua kieu dia chi
            type: text
          - name: _ts
            description: Ngay chinh sua
            type: timestamp
      - name: BillOfMaterials
        description: Hoa don cho nguyen vat lieu
        columns:
          - name: _id
            description: Khoa chinh cua bang
            type: text

          - name: product_id
            description: Khoa ngoai toi bang Product
            type: text

          - name: component_id
            description: ID cua vat lieu
            type: text
            tests:
              - not_null
          - name: BOMLevel
            description: Indicates the depth the component is from its parent
            type: text
          - name: UnitMeasureCode
            description: Khoa Ngoai toi bang UnitMeasure
            type: text
          - name: start_date
            description: Ngay bat dau vat lieu duoc su dung trong san xuat
            type: timestamp
          - name: end_date
            description: Ngay vat lieu khong con duoc su dung trong san xuat
            type: timestamp
          - name: _ts
            description: Ngay chinh sua
            type: timestamp
      - name: Store
        description: "Bảng staging cho dữ liệu cửa hàng, bóc tách thông tin chi tiết từ cột Demographics (XML)."
        columns:
          - name: _id
            description: "ID duy nhất của thực thể kinh doanh (Business Entity)."
            tests:
              - unique
              - not_null

          - name: salesperson_id
            description: "ID của nhân viên kinh doanh phụ trách cửa hàng này."

          - name: store_name
            description: "Tên chính thức của cửa hàng."
            tests:
              - not_null

          - name: annual_sales
            description: "Doanh số hàng năm bóc tách từ XML."

          - name: annual_revenue
            description: "Lợi nhuận hàng năm."

          - name: bank_name
            description: "Tên ngân hàng mà cửa hàng đang giao dịch."

          - name: business_type
            description: "Loại hình kinh doanh (ví dụ: BM - Bicycle Manufacturer)."

          - name: year_opened
            description: "Năm cửa hàng bắt đầu đi vào hoạt động."

          - name: specialty
            description: "Chuyên môn chính của cửa hàng (Mountain, Road, Touring...)."

          - name: square
            description: "Diện tích cửa hàng (Square Feet)."

          - name: brand
            description: "Số lượng thương hiệu đang kinh doanh."

          - name: internet
            description: "Loại kết nối internet (DSL, T1, v.v.)."

          - name: number_employees # Đã sửa lại từ 'internet' trong code SQL của bạn
            description: "Tổng số lượng nhân viên tại cửa hàng."

          - name: _ts
            description: "Thời điểm dữ liệu được cập nhật lần cuối."

